<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f5f0e8">
    <title>SPIN Brickell</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="vendor/leaflet/leaflet.css?v=175">
    <link rel="stylesheet" href="styles.css?v=198">
  </head>
  <body>
    <main class="app-shell">
      <section class="map-stage" aria-label="SPIN Brickell map">
        <div id="map"></div>
        <div id="weather-pill" class="weather-pill" aria-live="polite">Weather...</div>

        <aside id="places-panel" class="places-panel is-collapsed" aria-label="Places">
          <div class="places-brand">
            <span class="brand-mark" aria-hidden="true"></span>
            <div>
              <h1>SPIN Brickell</h1>
              <p id="place-count">Loading places</p>
            </div>
            <button id="toggle-places-panel" class="icon-button panel-toggle" type="button" title="Expand places" aria-label="Expand places" aria-expanded="false">+</button>
          </div>

          <label class="search-field">
            <input id="search-input" type="search" autocomplete="off" placeholder="Place or tag">
          </label>

          <div class="filter-row" id="tag-filters" aria-label="Tag filters"></div>

          <div class="overlay-toggle-row" aria-label="Map overlays">
            <label class="toggle-line">
              <input id="noise-filter" type="checkbox">
              <span>Noise</span>
            </label>
            <label class="toggle-line">
              <input id="radar-filter" type="checkbox">
              <span>Radar</span>
            </label>
          </div>
          <div id="radar-status" class="overlay-status" hidden>
            <span class="radar-swatch" aria-hidden="true"></span>
            <span>Radar on; clear skies may show no colors</span>
          </div>

          <div class="panel-head">
            <span id="visible-count">0 visible</span>
            <button id="reset-filters" class="reset-filters" type="button">Reset filters</button>
          </div>
          <div id="place-list" class="place-list"></div>
        </aside>

        <section id="detail-sheet" class="detail-sheet" aria-live="polite">
          <button id="close-detail" class="close-button" type="button" title="Close details" aria-label="Close details">x</button>
          <h2><a id="detail-title-link" href="#" target="_blank" rel="noopener noreferrer">Select a place</a></h2>
          <div class="detail-actions" aria-label="Route actions">
            <button id="route-home" type="button">Route home</button>
            <button id="route-location" type="button">Route location</button>
          </div>
          <div class="travel-mode" aria-label="Travel mode">
            <button id="mode-shortest" class="is-active" type="button" aria-pressed="true">Shortest</button>
            <button id="mode-scenic" type="button" aria-pressed="false">Scenic</button>
            <button id="mode-scooter" type="button" aria-pressed="false">Kid scooter</button>
            <button id="route-metromover" type="button" aria-pressed="false">Metromover</button>
          </div>
          <div id="route-status" class="route-status">No route selected</div>
          <button id="clear-route" class="clear-route" type="button" hidden>Clear route</button>
        </section>
      </section>
    </main>

    <script src="vendor/leaflet/leaflet.js?v=175"></script>
    <script src="app.js?v=201"></script>
  </body>
</html>
